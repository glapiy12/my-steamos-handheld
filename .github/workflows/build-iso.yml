name: Build ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup deprecated config dir
        run: rm -rf config || true

      - name: Build and push container image
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'latest'
          build_opts: '--no-sign'
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          registry_username: ${{ github.repository_owner }}
          registry: ghcr.io
        env:
          BLUEBUILD_SKIP_KEY_MANAGEMENT: true

      - name: Generate ISO
        run: |
          chmod +x generate-iso.sh
          ./generate-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-steamos-handheld-iso
          path: ./my-steamos.iso
