name: Build ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # На всякий случай удаляем устаревшую папку config
      - name: Cleanup deprecated config dir
        run: rm -rf config || true

      - name: Build ISO with BlueBuild
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipes/recipe.yml'
          cli_version: 'latest'          # ← используем последнюю версию
          build_opts: '--no-sign'
          iso: true
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          registry_username: ${{ github.repository_owner }}
          registry: ghcr.io
        env:
          BLUEBUILD_SKIP_KEY_MANAGEMENT: true   # ← отключаем авто-ключи
