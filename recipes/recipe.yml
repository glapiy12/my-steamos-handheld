# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: my-steamos-handheld
description: SteamOS-like system based on Fedora Kinoite with CachyOS kernel
image-version: 44

base-image: quay.io/fedora/fedora-kinoite

modules:
  - type: script
    scripts:
      - install-packages.sh

  - type: script
    scripts:
      - install-handygccs.sh

  - type: script
    scripts:
      - setup-steamos-session.sh
